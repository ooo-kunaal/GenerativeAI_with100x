name: Daily OPT Digest

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ hashFiles('Assignment 3 - AI feed curator/setup.R') }}
          restore-keys: r-packages-

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("shiny","googlesheets4","gargle","httr2","dplyr","jsonlite","tidyRSS","ellmer","htmltools"), repos="https://cloud.r-project.org")'

      - name: Run digest pipeline
        working-directory: 'Assignment 3 - AI feed curator'
        run: Rscript send_digest.R
